<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAF Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .header { background: #16213e; padding: 20px; border-bottom: 2px solid #0f3460; }
        .header h1 { color: #00d4ff; font-size: 24px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #16213e; padding: 20px; border-radius: 10px; border: 1px solid #0f3460; }
        .stat-card h3 { color: #00d4ff; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 32px; font-weight: bold; }
        .section { background: #16213e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .section h2 { color: #00d4ff; margin-bottom: 15px; font-size: 18px; }
        .btn { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #ff6b6b; }
        .btn-success { background: #00d4ff; color: #1a1a2e; }
        .btn-success:hover { background: #00b8e6; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; margin: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { color: #00d4ff; }
        .alert-item { background: #1a1a2e; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #e94560; }
        .alert-item.critical { border-left-color: #e94560; }
        .alert-item.warning { border-left-color: #ffc107; }
        #alerts { max-height: 400px; overflow-y: auto; }
        .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .status.online { background: #00ff00; }
        .status.offline { background: #ff0000; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ WAF Security Dashboard</h1>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>Заблокированные IP</h3>
                <div class="value" id="blocklistSize">-</div>
            </div>
            <div class="stat-card">
                <h3>Всего алертов</h3>
                <div class="value" id="totalAlerts">-</div>
            </div>
            <div class="stat-card">
                <h3>Критические</h3>
                <div class="value" id="criticalAlerts">-</div>
            </div>
            <div class="stat-card">
                <h3>Предупреждения</h3>
                <div class="value" id="warningAlerts">-</div>
            </div>
        </div>

        <div class="section">
            <h2>📡 Real-time Alerts (WebSocket)</h2>
            <div id="wsStatus"><span class="status offline"></span>Подключение...</div>
            <div id="alerts"></div>
        </div>

        <div class="section">
            <h2>🚫 Управление блокировками</h2>
            <input type="text" id="blockIp" placeholder="IP адрес">
            <input type="text" id="blockReason" placeholder="Причина">
            <button class="btn" onclick="blockIp()">Заблокировать</button>
            <button class="btn btn-success" onclick="loadBlocklist()">Обновить</button>
            <div id="blocklist"></div>
        </div>

        <div class="section">
            <h2>📊 Метрики (Prometheus)</h2>
            <a href="http://localhost:9090" target="_blank" class="btn btn-success">Prometheus</a>
            <a href="http://localhost:3000" target="_blank" class="btn btn-success">Grafana</a>
            <a href="http://localhost:8085" target="_blank" class="btn btn-success">Kafka UI</a>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://' + window.location.host + '/ws/alerts');
        const alerts = [];

        ws.onopen = () => {
            document.getElementById('wsStatus').innerHTML = '<span class="status online"></span>Подключено';
        };

        ws.onmessage = (event) => {
            const alert = JSON.parse(event.data);
            alerts.unshift(alert);
            if (alerts.length > 50) alerts.pop();
            renderAlerts();
        };

        ws.onclose = () => {
            document.getElementById('wsStatus').innerHTML = '<span class="status offline"></span>Отключено - переподключение...';
            setTimeout(() => window.location.reload(), 3000);
        };

        function renderAlerts() {
            const container = document.getElementById('alerts');
            container.innerHTML = alerts.map(a => `
                <div class="alert-item ${a.severity === 'CRITICAL' ? 'critical' : 'warning'}">
                    <strong>${a.severity}</strong> - ${a.threatType}<br>
                    IP: ${a.sourceIp}<br>
                    <small>${new Date(a.timestamp).toLocaleString()}</small>
                </div>
            `).join('');
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/alerts/stats');
                const data = await res.json();
                document.getElementById('blocklistSize').textContent = data.blocklistSize || 0;
                document.getElementById('totalAlerts').textContent = data.alertStats?.total || 0;
                document.getElementById('criticalAlerts').textContent = data.alertStats?.critical || 0;
                document.getElementById('warningAlerts').textContent = data.alertStats?.warning || 0;
            } catch (e) { console.error(e); }
        }

        async function loadBlocklist() {
            try {
                const res = await fetch('/api/alerts/blocklist');
                const data = await res.json();
                document.getElementById('blocklist').innerHTML = `
                    <table>
                        <tr><th>IP</th><th>Действия</th></tr>
                        ${data.blockedIps.map(ip => `<tr><td>${ip}</td><td><button class="btn" onclick="unblockIp('${ip}')">Разблокировать</button></td></tr>`).join('')}
                    </table>
                `;
            } catch (e) { console.error(e); }
        }

        async function blockIp() {
            const ip = document.getElementById('blockIp').value;
            const reason = document.getElementById('blockReason').value || 'Manual block';
            await fetch('/api/alerts/block', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ip, reason})
            });
            loadBlocklist();
            document.getElementById('blockIp').value = '';
        }

        async function unblockIp(ip) {
            await fetch('/api/alerts/block/' + ip, {method: 'DELETE'});
            loadBlocklist();
        }

        loadStats();
        loadBlocklist();
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
