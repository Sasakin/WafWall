version: '3.8'

services:
  # ==================== Java Applications ====================
  
  # ==================== WAF Gateway (2 replicas) ====================

  waf-gateway-1:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: waf-gateway-1
    ports:
      - "8081:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - WAF_BACKEND_URL=http://backend:80
    networks:
      - waf-network
    depends_on:
      - redis
      - kafka
      - backend

  waf-gateway-2:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: waf-gateway-2
    ports:
      - "8082:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - WAF_BACKEND_URL=http://backend:80
    networks:
      - waf-network
    depends_on:
      - redis
      - kafka
      - backend

  # ==================== Load Balancer ====================

  load-balancer:
    image: nginx:alpine
    container_name: waf-load-balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - waf-network
    depends_on:
      - waf-gateway-1
      - waf-gateway-2

  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    container_name: waf-processor
    ports:
      - "8091:8081"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=security
    networks:
      - waf-network
    depends_on:
      - kafka
      - clickhouse

  alert:
    build:
      context: .
      dockerfile: Dockerfile.alert
    container_name: waf-alert
    ports:
      - "8083:8083"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - waf-network
    depends_on:
      - redis
      - kafka

  # ==================== Alert Receiver ====================

  alert-receiver:
    build:
      context: .
      dockerfile: Dockerfile.alert-receiver
    container_name: waf-alert-receiver
    environment:
      - PYTHONUNBUFFERED=1
      - WAF_ALERT_HOST=alert
      - WAF_ALERT_PORT=8083
    ports:
      - "5000:5000"
    volumes:
      - alert-logs:/app/logs
    networks:
      - waf-network
    depends_on:
      - alert

  # ==================== Infrastructure ====================
  
  redis:
    image: redis:latest
    container_name: waf-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - waf-network

  zookeeper:
    image: confluentinc/cp-zookeeper:6.2.0
    container_name: waf-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - waf-network

  kafka:
    image: confluentinc/cp-kafka:6.2.0
    container_name: waf-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - waf-network

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: waf-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: security
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d
    networks:
      - waf-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: waf-kafka-ui
    depends_on:
      - kafka
      - zookeeper
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - waf-network

  backend:
    image: nginx:alpine
    container_name: waf-backend
    ports:
      - "8090:80"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - waf-network

  prometheus:
    image: prom/prometheus:latest
    container_name: waf-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - waf-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    container_name: waf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DATASOURCES_DEFAULT_URL=http://host.docker.internal:9090
      - GF_ALERTING_SECURITY_SKIP_SSL_VERIFY=true
      - GF_INSTALL_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - waf-network
    depends_on:
      - prometheus
      - clickhouse
    user: root

volumes:
  redis-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:
  alert-logs:
    driver: local

networks:
  waf-network:
    driver: bridge